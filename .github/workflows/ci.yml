name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # High and critical only: a low advisory with no upstream fix should not
      # block every merge, but a real one should.
      - run: npm audit --audit-level=high

      - run: npm run lint

      - run: npm run build

      - run: npm test

      - run: npm run test:e2e

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - run: npm audit --audit-level=high

      - run: npm run typecheck

      - run: npm run lint

      - run: npm run build

      - run: npm test
